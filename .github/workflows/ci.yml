name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: oven-sh/setup-bun@v2

      # Plugin deps via bun (the plugin's runtime) — provides node_modules so
      # the dispatcher's WS integration test, which spawns `bun server.ts`, runs
      # instead of skipping, and the plugin's own suite can run.
      - name: Install plugin deps
        run: bun install
        working-directory: plugin/voice

      # Lean install: the dispatcher's audio libs (faster-whisper, piper-tts,
      # onnxruntime…) are imported lazily, so the test suite runs without them.
      # --no-deps keeps CI fast and avoids fragile audio-wheel installs.
      - name: Install dispatcher (lean)
        run: |
          pip install --no-deps -e dispatcher
          pip install pytest pytest-asyncio websockets pyyaml click numpy

      - name: Dispatcher tests
        run: python -m pytest -q
        working-directory: dispatcher

      - name: Plugin tests
        run: bun run test
        working-directory: plugin/voice
