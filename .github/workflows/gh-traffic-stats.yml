name: gh-traffic-stats
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-traffic-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: gtapps/gh-traffic-stats@v1
        with:
          token: ${{ secrets.GH_TRAFFIC_STATS_TOKEN }}
          clones-label: "Downloads"
